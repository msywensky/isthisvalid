name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Type-check · Test · Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Prevents husky from installing git hooks in CI
          HUSKY: 0

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --ci --forceExit

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js does not warn on missing NEXT_PUBLIC_ vars.
          # Real secrets live in Vercel — never store them here.
          NEXT_PUBLIC_ADSENSE_ID: ""
          NEXT_PUBLIC_ZEROBOUNCE_AFFILIATE_URL: ""
          NEXT_PUBLIC_NORDVPN_AFFILIATE_URL: ""
